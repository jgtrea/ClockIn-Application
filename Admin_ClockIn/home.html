<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Home — ClockIn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="styles/topbar.css">
  <link rel="stylesheet" href="styles/user_ui.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../Supabase/supabase_config.js" defer></script>
  <script src="scripts/managers/profile_icon.js" defer></script>
  <script src="scripts/managers/clock_index.js" defer></script>
  <script src="scripts/managers/schedule_overview.js" defer></script>
  <script src="scripts/filter/search_bar.js" defer></script>
  <script src="scripts/index.js" defer></script>
</head>

<body>

<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="search-bar">
        <input type="text" placeholder="Search" id="sectionSearch">
        <button class="material-symbols-outlined" onclick="searchSections()">search</button>   
      </div>
      <div class="top-actions">
        <div class="profile-wrapper">
          <div class="profile-circle" id="profileCircle">A</div>
          <div class="profile-menu" id="profileMenu">
            <div class="profile-header">
              <div class="profile-circle small" id="profileCircleMenu">A</div>
              <div>
                <div class="profile-name" id="profileName">User</div>
                <div class="profile-email" id="profileEmail"></div>
              </div>
            </div>
            <hr>
            <a class="menu-item" href="user_profile.html" target="contentFrame">Profile</a>
            <a class="menu-item">Send Feedback</a>
            <button class="menu-item logout" id="logoutBtn">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <main class="content">
      <div style="display: flex; justify-content: space-between; align-items: baseline;">
        <h1>Section Overview</h1>
        <div style="text-align: right;">
          <div id="currentTime" style="font-size: 24px; font-weight: 600; color: #111827;"></div>
          <div id="currentDate" style="font-size: 14px; color: #6b7280; margin-top: 4px;"></div>
        </div>
      </div>
      <p class="tagline">Check which teachers are in which classroom</p>
      
      <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 25px 0 30px 0;">

      <div id="sectionsContainer" style="margin-top: 32px;">
        <p style="text-align: center; color: #9ca3af;">Loading sections...</p>
      </div>
    </main>
  </div>
</div>

<div id="scheduleModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
  <div style="background: white; border-radius: 12px; padding: 24px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <h2 id="modalTitle" style="margin: 0; font-size: 20px; font-weight: 700;"></h2>
      <button onclick="closeModal()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

</body>
</html>
