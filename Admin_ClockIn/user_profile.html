<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>User Profile — ClockIn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="styles/topbar.css">
  <link rel="stylesheet" href="styles/user_profile.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../Supabase/supabase_config.js" defer></script>
  <script src="profile/profile_icon.js" defer></script>
  <script src="scripts/managers/clock_index.js" defer></script>
  <script src="scripts/managers/schedule_overview.js" defer></script>
  <script src="scripts/index.js" defer></script>
  <script src="profile/user_profile.js" defer></script>  
</head>

<body>

<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="top-actions">
        <div class="profile-wrapper">
          <div class="profile-circle" id="profileCircle">A</div>
          <div class="profile-menu" id="profileMenu">
            <div class="profile-header">
              <div class="profile-circle small" id="profileCircleMenu">A</div>
              <div>
                <div class="profile-name" id="profileName">User</div>
                <div class="profile-email" id="profileEmail"></div>
              </div>
            </div>
            <hr>
            <a class="menu-item" href="user_profile.html" target="contentFrame">Profile</a>
            <a class="menu-item">Send Feedback</a>
            <button class="menu-item logout" id="logoutBtn">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <div class="profile-banner"></div>

    <div class="profile-card">
      <div class="avatar" id="avatar"></div>

      <h2 id="name"></h2>
      <p id="email"></p>

      <div class="info-grid">
        <div class="label">Username</div>
        <div class="value" id="username"></div>
        <span class="material-symbols-outlined edit">edit</span>

        <div class="label">Email</div>
        <div class="value" id="emailField"></div>
        <span class="material-symbols-outlined edit">edit</span>

        <div class="label">Employment</div>
        <div class="value" id="employmentField">N/A</div>
        <span class="material-symbols-outlined edit">edit</span>
      </div>

      <a href="home.html" class="back-btn">Back</a>
    </div>

  </div>
</div>

</body>
</html>
