<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Attendance — ClockIn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="styles/topbar.css">
  <link rel="stylesheet" href="styles/user_ui.css">
  <link rel="stylesheet" href="styles/container_card/attendance_add_card.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../Supabase/supabase_config.js" defer></script>
  <script src="scripts/home.js" defer></script>
  <script src="scripts/user_management/attendance_db.js" defer></script>
  <script src="scripts/filter_user.js" defer></script>
</head>

<body data-page="attendance_db">
   
  <div class="app">
    <div class="main">
      <header class="topbar">
      <div class="search-bar">
        <input type="text" placeholder="Search..." id="globalSearch">
        <button class="material-symbols-outlined" onclick="performSearch()">search</button>   
      </div>
      <div class="top-actions">
        <div class="profile-wrapper">
          <div class="profile-circle" id="profileCircle">A</div>
          <div class="profile-menu" id="profileMenu">
            <div class="profile-header">
              <div class="profile-circle small" id="profileCircleMenu">A</div>
              <div>
                <div class="profile-name" id="profileName">User</div>
                <div class="profile-email" id="profileEmail"></div>
              </div>
            </div>
            <hr>
            <a class="menu-item" href="user_profile.html" target="contentFrame">Profile</a>
            <a class="menu-item">Send Feedback</a>
            <button class="menu-item logout" id="logoutBtn">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <main class="content">

      <div class="dashboard-header">
        <div class="dashboard-title-wrapper">
          <div>
            <h1>Attendance</h1>
            <p class="tagline">Track user attendance records.</p>
          </div>
          <div style="display: flex; gap: 8px;">
            <div style="position: relative;">
              <button id="sortBtn" onclick="toggleSortMenu()" style="padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 10px; background: #fff; color: #111827; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 4px;">
                <span class="material-symbols-outlined" style="font-size: 20px;">sort</span>
                <span class="material-symbols-outlined" id="sortIndicator" style="font-size: 16px;">keyboard_arrow_down</span>
              </button>
              <div id="sortMenu" style="display: none; position: absolute; top: 100%; right: 0; background: #fff; border: 1px solid #d1d5db; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 1000; min-width: 150px;">
                <button onclick="sortAttendance('name')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: none; text-align: left; cursor: pointer; font-size: 14px;">Sort by Name</button>
                <button onclick="sortAttendance('id')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: none; text-align: left; cursor: pointer; font-size: 14px;">Sort by ID</button>
                <button onclick="sortAttendance('createdAt')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: none; text-align: left; cursor: pointer; font-size: 14px;">Sort by Date</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 0 0 20px 0;">
       
      <div id="attendanceList"></div>
      <div id="pagination" style="display: none; text-align: center; margin-top: 20px;">
        <button id="prevBtn" onclick="changePage(-1)" style="margin: 0 5px; padding: 8px 12px; border: 1px solid #d1d5db; background: #fff; border-radius: 6px; cursor: pointer;">Previous</button>
        <span id="pageInfo" style="margin: 0 15px; color: #6b7280;"></span>
        <button id="nextBtn" onclick="changePage(1)" style="margin: 0 5px; padding: 8px 12px; border: 1px solid #d1d5db; background: #fff; border-radius: 6px; cursor: pointer;">Next</button>
      </div>
    </main>

    </div>
  </div>

<script>
function toggleSortMenu() {
  const menu = document.getElementById('sortMenu');
  const indicator = document.getElementById('sortIndicator');
  const isOpen = menu.style.display === 'block';
  
  menu.style.display = isOpen ? 'none' : 'block';
  indicator.textContent = isOpen ? 'keyboard_arrow_down' : 'keyboard_arrow_up';
}

document.addEventListener('click', function(event) {
  const sortBtn = document.getElementById('sortBtn');
  const sortMenu = document.getElementById('sortMenu');
  const indicator = document.getElementById('sortIndicator');
  
  if (!sortBtn.contains(event.target) && !sortMenu.contains(event.target)) {
    sortMenu.style.display = 'none';
    indicator.textContent = 'keyboard_arrow_down';
  }
});
</script>

</body>
</html>
