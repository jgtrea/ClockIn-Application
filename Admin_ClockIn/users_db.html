<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Users — ClockIn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="styles/topbar.css">
  <link rel="stylesheet" href="styles/user_ui.css">
  <link rel="stylesheet" href="styles/container_card/attendance_add_card.css">

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../Firebase/firebase_config.js" defer></script>
  <script src="scripts/home.js" defer></script>
  <script src="scripts/user_management/users_db.js" defer></script>
  <script src="scripts/filter_user.js" defer></script>
</head>

<!-- TODO: List out choices for department and employement -->
<!-- TODO: Remove choice to edit out password and in user interface. Make function in firebase through authentification -->

<body data-page="users_db">

<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="search-bar">
        <input type="text" placeholder="Search..." id="globalSearch">
        <button class="material-symbols-outlined" onclick="performSearch()">search</button>   
      </div>
      <div class="top-actions">
        <div class="profile-wrapper">
          <div class="profile-circle" id="profileCircle">A</div>
          <div class="profile-menu" id="profileMenu">
            <div class="profile-header">
              <div class="profile-circle small" id="profileCircleMenu">A</div>
              <div>
                <div class="profile-name" id="profileName">User</div>
                <div class="profile-email" id="profileEmail"></div>
              </div>
            </div>
            <hr>
            <a class="menu-item" href="user_profile.html" target="contentFrame">Profile</a>
            <a class="menu-item">Send Feedback</a>
            <button class="menu-item logout" id="logoutBtn">Logout</button>
          </div>
        </div>
      </div>
    </header>
  
    <main class="content">

      <div class="dashboard-header">
        <div class="dashboard-title-wrapper">
          <div>
            <h1>Users</h1>
            <p class="tagline">Manage personnel profiles and access.</p>
          </div>
          <div style="display: flex; gap: 8px;">
            <button class="btn-outline" id="sortBtn" onclick="sortByName()">
              Sort by Name <span id="sortIcon" style="display: none;"></span>
            </button>
            <button class="export-btn" id="addUserBtn">Add User</button>
          </div>
        </div>
      </div>

      <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 0 0 20px 0;">
      
      <div class="users-table">
        <div id="usersList"></div>
        <div id="pagination" style="display: none; text-align: center; margin-top: 20px;">
          <button id="prevBtn" onclick="changePage(-1)" class="btn-outline" style="margin: 0 5px;">Previous</button>
          <span id="pageInfo" style="margin: 0 15px; color: #6b7280;"></span>
          <button id="nextBtn" onclick="changePage(1)" class="btn-outline" style="margin: 0 5px;">Next</button>
        </div>
      </div>

    </main>
  </div>

</div>

</body>
</html>
