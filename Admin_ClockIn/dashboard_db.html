<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dashboard — ClockIn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="styles/topbar.css">
  <link rel="stylesheet" href="styles/user_ui.css">
  <link rel="stylesheet" href="styles/container_card/dashboard_db.css">

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../Firebase/firebase_config.js" defer></script>
  <script src="scripts/home.js" defer></script>
  <script src="scripts/user_management/attendance_trend_db.js" defer></script>
  <script src="scripts/user_management/dashboard_db.js" defer></script>
</head>

<body>

<div class="app">
  <div class="main">
    <header class="topbar">
      <div class="search-bar">
        <input type="text" placeholder="Search..." id="globalSearch">
        <button class="material-symbols-outlined" onclick="performSearch()">search</button>      
      </div>
      <div class="top-actions">
        <div class="profile-wrapper">
          <div class="profile-circle" id="profileCircle">A</div>
          <div class="profile-menu" id="profileMenu">
            <div class="profile-header">
              <div class="profile-circle small" id="profileCircleMenu">A</div>
              <div>
                <div class="profile-name" id="profileName">User</div>
                <div class="profile-email" id="profileEmail"></div>
              </div>
            </div>
            <hr>
            <a class="menu-item" href="user_profile.html" target="contentFrame">Profile</a>
            <a class="menu-item">Send Feedback</a>
            <button class="menu-item logout" id="logoutBtn">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <main class="content">

      <div class="dashboard-title-wrapper">
        <div>
          <h1>Dashboard</h1>
          <p class="tagline">
            A smart and efficient way to monitor attendance in real time.
          </p>
        </div>
        <button class="export-btn">Export Data</button>
      </div>

      <!-- Stats Cards -->

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value today-attendance" id="todayAttendance">-</div>
          <div class="stat-label">Today's Attendance</div>
          <div class="stat-sublabel">Loading...</div>
        </div>
        <div class="stat-card">
          <div class="stat-value total-users" id="totalUsers">-</div>
          <div class="stat-label">Total Users</div>
          <div class="stat-sublabel">Loading...</div>
        </div>
        <div class="stat-card">
          <div class="stat-value currently-active" id="currentlyActive">-</div>
          <div class="stat-label">Currently Active</div>
          <div class="stat-sublabel">Loading...</div>
        </div>
        <div class="stat-card">
          <div class="stat-value late-today" id="lateToday">-</div>
          <div class="stat-label">Late Today</div>
          <div class="stat-sublabel">Loading...</div>
        </div>
      </div>

      <!-- Chart Section -->

      <div class="chart-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h3 class="chart-title">Attendance Trend</h3>
          <select id="trendSelect" onchange="onTrendChange()" style="padding: 6px 12px; border: 1px solid #d1d5db; border-radius: 6px; background: white; color: #6b7280; font-size: 12px; cursor: pointer;">
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="yearly">Yearly</option>
          </select>
        </div>
        <div id="attendanceChart">
        </div>
      </div>

      <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 0 0 20px 0;">

      <div class="recent-activity">
        <h2 class="recent-activity-title">Recent Clock-ins</h2>
        <div id="activityFeed">
          <p class="loading-text">Loading recent activity...</p>
        </div>
        <div id="pagination">
          <button id="prevBtn" onclick="changePage(-1)" class="pagination-btn">Previous</button>
          <span id="pageInfo" class="page-info"></span>
          <button id="nextBtn" onclick="changePage(1)" class="pagination-btn">Next</button>
        </div>
      </div>

    </main>
  </div>
</div>

</body>
</html>
