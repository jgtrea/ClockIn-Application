<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dashboard — ClockIn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="styles/user_ui.css">
  <link rel="stylesheet" href="styles/container_card/dashboard_db.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../Supabase/supabase_config.js" defer></script>
  <script src="../Authentification/auth-guard.js"></script>
  <script src="scripts/utils/timestamp_utils.js" defer></script>
  <script src="scripts/managers/clock_index.js" defer></script>
  <script src="scripts/managers/schedule_overview.js" defer></script>
  <script src="scripts/user_management/attendance_trend_db.js" defer></script>
  <script src="scripts/user_management/dashboard_db.js" defer></script>
</head>

<body>

<div class="app">
  <div class="main">
    <main class="content">

      <div class="dashboard-title-wrapper">
        <div>
          <h1>Dashboard</h1>
          <p class="tagline">
            A smart and efficient way to monitor attendance in real time.
          </p>
        </div>
        <div class="dropdown-wrapper">
          <button class="export-btn" id="exportBtn" onclick="toggleExportMenu()">
            <span class="material-symbols-outlined">download</span>
            <span>Export</span>
          </button>
          <div id="exportMenu" class="action-dropdown" style="display: none;">
            <button class="action-dropdown-item" onclick="exportDashboardCSV()">
              <span class="material-symbols-outlined">table_chart</span>
              <span>Export as CSV</span>
            </button>
            <button class="action-dropdown-item" onclick="exportDashboardJSON()">
              <span class="material-symbols-outlined">code</span>
              <span>Export as JSON</span>
            </button>
          </div>
        </div>
      </div>

      <div class="stats-container">
        <div class="stat-grid">
            <div class="stat-card">
              <div class="stat-left">
                <div class="stat-label">Total Teachers</div>
                <div class="stat-value total-users" id="totalTeachers">-</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-left">
                <div class="stat-label">Arrived on Schedule</div>
                <div class="stat-value on-schedule" id="onSchedule">-</div>
              </div>
              <div class="stat-percentage" id="onSchedulePct">-</div>
            </div>
            <div class="stat-card">
              <div class="stat-left">
                <div class="stat-label">Arrived Late</div>
                <div class="stat-value late-today" id="lateToday">-</div>
              </div>
              <div class="stat-percentage" id="lateTodayPct">-</div>
            </div>
            <div class="stat-card">
              <div class="stat-left">
                <div class="stat-label">Absent</div>
                <div class="stat-value absent-today" id="absentToday">-</div>
              </div>
              <div class="stat-percentage" id="absentTodayPct">-</div>
            </div>
            <div class="stat-card">
              <div class="stat-left">
                <div class="stat-label">Excused</div>
                <div class="stat-value excused-today" id="excusedToday">-</div>
              </div>
              <div class="stat-percentage" id="excusedTodayPct">-</div>
            </div>
          </div>

          <div class="chart-section">
            <div class="chart-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
              <h3 class="chart-title">Attendance Overview</h3>
              <div class="chart-filters" style="display: flex; gap: 8px; align-items: center;">
                <select id="countTypeSelect" onchange="toggleCountType()" style="padding: 6px 12px; border: 1px solid #d1d5db; border-radius: 6px; background: white; color: #6b7280; font-size: 12px; cursor: pointer;">
                  <option value="total">Total Attendance</option>
                  <option value="each">Individual Attendance</option>
                </select>
                <select id="trendSelect" onchange="onTrendChange()" style="padding: 6px 30px 6px 12px; border: 1px solid #d1d5db; border-radius: 6px; background: white; color: #6b7280; font-size: 12px; cursor: pointer;">
                  <option value="weekly">Weekly</option>
                  <option value="monthly">Monthly</option>
                  <option value="yearly">Yearly</option>
                </select>
              </div>
            </div>
            <div id="attendanceChart">
            </div>
        </div>
      </div>

      <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 0 0 20px 0;">

      <div class="dashboard-bottom">
        <div class="recent-activity-container recent-activity-half">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h2 class="recent-activity-title">Recent Clock-ins</h2>
            <button class="view-all-btn" onclick="window.location.href='recent_clockin.html'">View All</button>
          </div>
          <div id="activityFeed">
            <p class="loading-text">Loading recent activity...</p>
          </div>
          <div id="pagination">
            <button id="prevBtn" onclick="changePage(-1)" class="pagination-btn"><span class="material-symbols-outlined" style="font-size: 18px;">chevron_left</span></button>
            <span id="pageInfo" class="page-info"></span>
            <button id="nextBtn" onclick="changePage(1)" class="pagination-btn"><span class="material-symbols-outlined" style="font-size: 18px;">chevron_right</span></button>
          </div>
        </div>
        <div class="recent-activity-container recent-activity-half">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h2 class="recent-activity-title">Section Clock-ins</h2>
          </div>
          <div id="sectionClockinsFeed">
            <p class="loading-text">Loading section clock-ins...</p>
          </div>
          <div id="sectionPagination">
            <button id="sectionPrevBtn" onclick="changeSectionPage(-1)" class="pagination-btn"><span class="material-symbols-outlined" style="font-size: 18px;">chevron_left</span></button>
            <span id="sectionPageInfo" class="page-info"></span>
            <button id="sectionNextBtn" onclick="changeSectionPage(1)" class="pagination-btn"><span class="material-symbols-outlined" style="font-size: 18px;">chevron_right</span></button>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<div id="datePickerModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
  <div class="modal-content" style="background: white; margin: 15% auto; padding: 20px; border-radius: 8px; width: 300px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <h3 style="margin: 0;">Select Date</h3>
      <button onclick="closeDatePicker()" style="background: none; border: none; font-size: 20px; cursor: pointer;">&times;</button>
    </div>
    <input type="date" id="selectedDate" style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; margin-bottom: 15px;">
    <button onclick="showAttendanceByDate()" class="btn-primary" style="width: 100%; padding: 10px; background: #FF725E; color: white; border: none; border-radius: 6px; cursor: pointer;">Show Attendance</button>
  </div>
</div>

</body>
</html>
