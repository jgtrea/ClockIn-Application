<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Attendance Details — ClockIn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="styles/user_ui.css">
  <link rel="stylesheet" href="styles/pages/attendance_detail.css">
  <link rel="stylesheet" href="styles/responsive.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../db_config/supabase_config.js" defer></script>
  <script src="../access/auth-guard.js"></script>
  <script src="scripts/utils/timestamp_utils.js" defer></script>
  <script src="scripts/user_management/attendance_detail.js" defer></script>
</head>

<body data-page="attendance_detail">

<div class="app">
  <div class="main">
    <main class="content">

      <div class="dashboard-header">
        <div class="dashboard-title-wrapper">
          <div>
            <button class="btn-outline" onclick="window.location.href='attendance_db.html'" style="margin-bottom: 12px;">
              <span class="material-symbols-outlined">arrow_back</span>
              Back to Attendance
            </button>
            <h1 id="userName">Attendance Records</h1>
            <p class="tagline" id="userEmail"></p>
          </div>
          <div style="display: flex; gap: 8px; align-items: center;">
            <div class="dropdown-wrapper">
              <button class="export-btn" id="exportBtn" onclick="toggleExportMenu()">
                <span class="material-symbols-outlined">download</span>
                Export
              </button>
              <div id="exportMenu" class="action-dropdown" style="display: none;">
                <button class="action-dropdown-item" onclick="exportAttendanceDetailCSV()">
                  <span class="material-symbols-outlined">table_chart</span>
                  Export as CSV
                </button>
                <button class="action-dropdown-item" onclick="exportAttendanceDetailJSON()">
                  <span class="material-symbols-outlined">code</span>
                  Export as JSON
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 0 0 20px 0;">
        
      <div class="users-table-container">
        <div class="table-header">
          <div class="table-actions-left">
            <div class="search-username-wrapper">
              <input type="text" id="searchAttendanceInput" class="search-username-input" placeholder="Search Subject/Section" oninput="searchAttendance(this.value)" autocomplete="off">
            </div>
            <div class="table-filter-wrapper">
              <button class="filter-btn" onclick="toggleStatusFilter()">
                <span class="material-symbols-outlined">filter_list</span>
                Status
              </button>
              <div id="statusFilterMenu" class="filter-dropdown filter-dropdown-grey" style="display: none;">
                <label style="display: block; padding: 8px 12px; font-size: 13px;">Filter by Status</label>
                <div style="padding: 4px 12px;">
                  <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer;">
                    <input type="checkbox" value="Present" onchange="filterByStatus()"> Present
                  </label>
                  <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer;">
                    <input type="checkbox" value="Absent" onchange="filterByStatus()"> Absent
                  </label>
                  <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer;">
                    <input type="checkbox" value="Late" onchange="filterByStatus()"> Late
                  </label>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="attendance-detail-container">
        <div class="calendar-section">
          <div class="calendar-header">
            <button class="btn-icon" onclick="previousMonth()">
              <span class="material-symbols-outlined">chevron_left</span>
            </button>
            <h2 id="currentMonth" onclick="openDatePicker()" style="cursor: pointer;"></h2>
            <button class="btn-icon" onclick="nextMonth()">
              <span class="material-symbols-outlined">chevron_right</span>
            </button>
          </div>
          <div id="datePickerModal" class="date-picker-modal" style="display: none;">
            <div class="date-picker-content">
              <select id="monthSelect" class="date-picker-select"></select>
              <select id="yearSelect" class="date-picker-select"></select>
              <div class="date-picker-actions">
                <button class="btn-outline" onclick="closeDatePicker()">Cancel</button>
                <button class="export-btn" onclick="applyDatePicker()">Apply</button>
              </div>
            </div>
          </div>
          <div class="calendar-weekdays">
            <div>Sun</div>
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="records-section">
          <div class="records-header">
            <h3 id="recordsTitle">Select a date</h3>
          </div>
          <div class="attendance-table-container">
            <table class="attendance-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Time In</th>
                  <th>Time Out</th>
                  <th>Subject</th>
                  <th>Section</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="attendanceRecordsList">
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div>

</div>

</body>
<script>
function toggleStatusFilter() {
  const menu = document.getElementById('statusFilterMenu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}

function filterByStatus() {
  const checkboxes = document.querySelectorAll('#statusFilterMenu input[type="checkbox"]:checked');
  const selectedStatuses = Array.from(checkboxes).map(cb => cb.value);
  
  const rows = document.querySelectorAll('#attendanceRecordsList tr');
  rows.forEach(row => {
    const statusCell = row.querySelector('td:nth-child(6)');
    if (statusCell) {
      const status = statusCell.textContent.trim();
      if (selectedStatuses.length === 0 || selectedStatuses.includes(status)) {
        row.style.display = '';
      } else {
        row.style.display = 'none';
      }
    }
  });
}

function searchAttendance(query) {
  query = query.toLowerCase();
  const rows = document.querySelectorAll('#attendanceRecordsList tr');
  rows.forEach(row => {
    const text = row.textContent.toLowerCase();
    if (text.includes(query)) {
      row.style.display = '';
    } else {
      row.style.display = 'none';
    }
  });
}

// Close filter menu when clicking outside
document.addEventListener('click', function(e) {
  const filterWrapper = document.querySelector('.table-filter-wrapper');
  if (filterWrapper && !filterWrapper.contains(e.target)) {
    const menu = document.getElementById('statusFilterMenu');
    if (menu) menu.style.display = 'none';
  }
});
</script>
</html>
