<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClockIn — Dashboard</title>
  <link rel="stylesheet" href="styles/home.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="scripts/firebase_config.js" defer></script>
  <script src="scripts/home.js" defer></script>
</head>
<body>

<div class="app">
  <aside class="sidebar collapsed" id="sidebar">
    <div class="sidebar-header">
      <button class="hamburger" id="hamburger">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <span class="brand">ClockIn</span>
    </div>

    <nav class="menu">
      <a href="home.html" target="contentFrame" class="active" onclick="setActive(this)">
        <span class="material-symbols-outlined">home</span>
        <span class="label">Home</span>
      </a>
      <a href="dashboard_db.html" target="contentFrame" onclick="setActive(this)">
        <span class="material-symbols-outlined">dashboard</span>
        <span class="label">Dashboard</span>
      </a>
      <a href="users_db.html" target="contentFrame" onclick="setActive(this)">
        <span class="material-symbols-outlined">group</span>
        <span class="label">Users</span>
      </a>
      <a href="schedule_db.html" target="contentFrame" onclick="setActive(this)">
        <span class="material-symbols-outlined">calendar_month</span>
        <span class="label">Schedule</span>
      </a>
      <a href="attendance_db.html" target="contentFrame" onclick="setActive(this)">
        <span class="material-symbols-outlined">how_to_reg</span>
        <span class="label">Attendance</span>
      </a>
      <a href="policy.html" target="contentFrame" onclick="setActive(this)">
        <span class="material-symbols-outlined">policy</span>
        <span class="label">Policy</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="#" id="sidebarLogout">
        <span class="material-symbols-outlined">logout</span>
        <span class="label">Logout</span>
      </a>
    </div>
  </aside>

  <div class="main">    
    <iframe name="contentFrame" src="home.html" frameborder="0" id="contentFrame"></iframe>
  </div>
</div>
 
</body>
</html>
<script>
function performSearch() {
  const searchTerm = document.getElementById('globalSearch').value.toLowerCase();
  const iframe = document.getElementById('contentFrame');
  
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage({
      type: 'search',
      term: searchTerm
    }, '*');
  }
}

document.getElementById('globalSearch').addEventListener('keyup', function(e) {
  if (e.key === 'Enter') {
    performSearch();
  } else {
    performSearch();
  }
});

function setActive(clickedLink) {
  document.querySelectorAll('.menu a').forEach(link => {
    link.classList.remove('active');
  });
  clickedLink.classList.add('active');
  
  const sidebar = document.getElementById('sidebar');
  if (sidebar) {
    sidebar.classList.add('collapsed');
    sidebar.classList.remove('expanded');
  }
}
</script>
