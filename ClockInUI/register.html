<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Register — ClockIn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles/login-register.css">
  <script type="module" src="scripts/register.js" defer></script>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-right">
    <div class="hero">
      <div class="hero-content">
        <div class="hero-title">CLOCK IN</div>
        <p class="hero-sub">Create your account to manage attendance</p>
      </div>
    </div>
  </div>

  <div class="auth-left">
    <div class="login-container">
      <main>
        <form class="login-form" id="registerForm" novalidate>
          <h2 class="form-title">Sign Up</h2>

          <label for="username">Username</label>
          <input type="text" id="username" name="username" required placeholder="Your username">

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="email@example.com">

          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="••••••••">

          <button type="submit" class="btn">Sign Up</button>

          <p class="signup">Already have an account? <a href="login.html">Login</a></p>
        </form>
      </main>
    </div>
  </div>
</div>

</body>
</html>
