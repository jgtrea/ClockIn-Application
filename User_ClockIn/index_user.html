<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClockIn — User Dashboard</title>
  <link rel="stylesheet" href="styles/user_ui.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../Authentification/authentification.js"></script>
  <script src="../Supabase/supabase_config.js" defer></script>
  <script src="scripts/home_user.js" defer></script>
</head>
<body data-allow-employees="true">

<div class="app">
  <aside class="sidebar collapsed" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <img src="../Images/clockin-logo.svg" alt="ClockIn Logo" class="brand-logo">
        <span class="brand-text">ClockIn</span>
      </div>
      <button class="hamburger" id="hamburger">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>

    <nav class="menu">
      <a href="home_user.html" target="contentFrame" class="active" onclick="setActive(this)">
        <span class="material-symbols-outlined">home</span>
        <span class="label">Home</span>
      </a>
      <a href="checkin_user.html" target="contentFrame" onclick="setActive(this)">
        <span class="material-symbols-outlined">login</span>
        <span class="label">Check In/Out</span>
      </a>
      <a href="schedule_user.html" target="contentFrame" onclick="setActive(this)">
        <span class="material-symbols-outlined">calendar_month</span>
        <span class="label">Schedule</span>
      </a>
      <a href="attendance_user.html" target="contentFrame" onclick="setActive(this)">
        <span class="material-symbols-outlined">how_to_reg</span>
        <span class="label">Attendance</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="#" id="sidebarLogout">
        <span class="material-symbols-outlined">logout</span>
        <span class="label">Logout</span>
      </a>
    </div>
  </aside>

  <div class="main">    
    <iframe name="contentFrame" src="home_user.html" frameborder="0" id="contentFrame"></iframe>
  </div>
</div>
   
</body>
</html>
<script>
function setActive(clickedLink) {
  document.querySelectorAll('#sidebar a').forEach(link => {
    link.classList.remove('active');
  });
  clickedLink.classList.add('active');
  
  const sidebar = document.getElementById('sidebar');
  if (sidebar) {
    sidebar.classList.add('collapsed');
    sidebar.classList.remove('expanded');
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const sidebar = document.getElementById('sidebar');
  const hamburger = document.getElementById('hamburger');
  const sidebarLogout = document.getElementById('sidebarLogout');
  
  if (hamburger && sidebar) {
    hamburger.addEventListener('click', () => {
      sidebar.classList.toggle('expanded');
      sidebar.classList.toggle('collapsed');
    });
  }
  
  if (sidebarLogout) {
    sidebarLogout.addEventListener('click', async (e) => {
      e.preventDefault();
      if (window.authentification) {
        window.authentification.signOut();
      } else {
        const supabase = window.supabaseClient;
        if (supabase) {
          await supabase.auth.signOut();
        }
        window.location.href = '../Login_Path/login.html';
      }
    });
  }
});
</script>
