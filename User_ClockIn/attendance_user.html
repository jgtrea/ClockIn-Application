<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Attendance — ClockIn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="styles/topbar.css">
  <link rel="stylesheet" href="styles/user_ui.css">

  <!-- Supabase Client Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../Supabase/supabase_config.js" defer></script>
  <script src="scripts/home_user.js" defer></script>
  <script src="scripts/attendance_user.js" defer></script>
</head>

<body data-page="attendance_user">
   
  <div class="app">
    <div class="main">
      <header class="topbar">
        <div class="top-actions">
          <div class="profile-wrapper">
            <div class="profile-circle" id="profileCircle">A</div>
            <div class="profile-menu" id="profileMenu">
              <div class="profile-header">
                <div class="profile-circle small" id="profileCircleMenu">A</div>
                <div>
                  <div class="profile-name" id="profileName">User</div>
                  <div class="profile-email" id="profileEmail"></div>
                </div>
              </div>
              <hr>
              <a class="menu-item">Send Feedback</a>
              <button class="menu-item logout" id="logoutBtn">Logout</button>
            </div>
          </div>
        </div>
      </header>

      <main class="content">

        <div class="dashboard-header">
          <div class="dashboard-title-wrapper">
            <div>
              <h1>My Attendance</h1>
              <p class="tagline">View your attendance records.</p>
            </div>
          </div>
        </div>

        <div id="attendanceList"></div>
      </main>

    </div>
  </div>
</body>
</html>
