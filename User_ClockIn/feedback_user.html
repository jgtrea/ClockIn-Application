<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback — ClockIn</title>
  <link rel="stylesheet" href="styles/user_ui.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../Supabase/supabase_config.js" defer></script>
  <script src="../Authentification/auth-guard.js"></script>
  <script src="scripts/user_shared.js" defer></script>
</head>
<body data-page="feedback_user" data-allow-employees="true">

<div class="app">
  <div class="main">
    <main class="content">
      <div class="dashboard-header">
        <div class="dashboard-title-wrapper">
          <div>
            <h1>Feedback</h1>
            <p class="tagline">Send feedback to administrators.</p>
          </div>
          <button class="export-btn" onclick="openFeedbackModal()">Send Feedback</button>
        </div>
      </div>

      <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 0 0 20px 0;">
      
      <div id="feedbackList"></div>
    </main>
  </div>
</div>

<div id="feedbackModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
  <div style="background: white; border-radius: 12px; padding: 0; max-width: 600px; width: 90%; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);">
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 24px; border-bottom: 1px solid #e5e7eb;">
      <h2 style="margin: 0; font-size: 18px; font-weight: 600; color: #111827;">Send Feedback</h2>
      <button onclick="closeFeedbackModal()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #9ca3af;">&times;</button>
    </div>
    
    <div style="padding: 24px;">
      <div style="margin-bottom: 16px;">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #374151;">Title</label>
        <input id="feedbackTitle" style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px;" type="text" placeholder="Brief title">
      </div>
      
      <div style="margin-bottom: 24px;">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #374151;">Message</label>
        <textarea id="feedbackMessage" style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; min-height: 120px; resize: vertical;" placeholder="Tell us what you think..."></textarea>
      </div>
      
      <div style="margin-bottom: 24px;">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
          <input type="checkbox" id="anonymousCheckbox" style="width: 18px; height: 18px; cursor: pointer;">
          <span style="font-size: 14px; color: #374151;">Submit anonymously</span>
        </label>
      </div>
      
      <div style="display: flex; justify-content: flex-end; gap: 12px;">
        <button onclick="closeFeedbackModal()" style="padding: 12px 24px; border: 1px solid #d1d5db; background: white; color: #374151; border-radius: 8px; font-weight: 600; cursor: pointer;">Cancel</button>
        <button onclick="submitFeedback()" style="padding: 12px 24px; background: #FF725E; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Submit</button>
      </div>
    </div>
  </div>
</div>

<script src="scripts/feedback_user.js"></script>
</body>
</html>
