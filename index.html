<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — ClockIn</title>
  <link rel="stylesheet" href="login_path/styles/login_ui.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db_config/supabase_config.js"></script>
  <script type="module" src="login_path/scripts/login_functions.js" defer></script>
  <script>
    function togglePasswordVisibility(inputId, toggleIcon) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        toggleIcon.textContent = 'visibility_off';
      } else {
        input.type = 'password';
        toggleIcon.textContent = 'visibility';
      }
    }

    // Alert Prompt Functions
    let alertTimeout;

    function showAlertPrompt(message, type = 'error') {
      const alertEl = document.getElementById('alertPrompt');
      const messageEl = alertEl.querySelector('.alert-prompt-message');
      
      // Set message and type
      messageEl.textContent = message;
      alertEl.className = 'alert-prompt ' + type;
      
      // Show the alert
      alertEl.classList.add('show');
      
      // Clear any existing timeout
      if (alertTimeout) {
        clearTimeout(alertTimeout);
      }
      
      // Auto-dismiss after 5 seconds
      alertTimeout = setTimeout(() => {
        closeAlertPrompt();
      }, 5000);
    }

    function closeAlertPrompt() {
      const alertEl = document.getElementById('alertPrompt');
      alertEl.classList.remove('show');
      
      if (alertTimeout) {
        clearTimeout(alertTimeout);
        alertTimeout = null;
      }
    }
  </script>
</head>
<body>
  <!-- Alert Prompt Container -->
  <div id="alertPrompt" class="alert-prompt">
    <span class="alert-prompt-message"></span>
    <button class="alert-prompt-close" onclick="closeAlertPrompt()">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>

  <header class="auth-header">
    <div class="logo">
      <img src="resource/clockin-logo.svg" alt="ClockIn Logo">
      <span>Clock In</span>
    </div>
  </header>

  <div class="login-wrapper">
    <div class="login-container">
      <div class="auth-wrapper">
        <form class="login-form" id="loginForm" action="#" method="get" novalidate>
          <h2 class="form-title">Login to your Account</h2>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="email@example.com">

          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" required placeholder="********">
            <span class="material-symbols-outlined password-toggle" onclick="togglePasswordVisibility('password', this)">visibility</span>
          </div>

          <div style="text-align: right; margin-bottom: 16px;">
            <a class="forgot" href="login_path/reset/reset_code.html">Forgot Password?</a>
          </div>

          <button type="submit" class="btn">Login</button>
        </form>
      </div>
    </div>
  </div>

  <footer class="auth-footer">
    <div class="footer-links">
      <a href="login_path/policy/terms.html">Terms of Service</a>
      <span>|</span>
      <a href="login_path/policy/privacy_policy.html">Privacy Policy</a>
    </div>
    <div class="copyright">
      <span class="material-symbols-outlined">copyright</span> 2026 Clock In
    </div>
  </footer>
</body>
</html>
