<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — ClockIn</title>
  <link rel="stylesheet" href="styles/login_ui.css">
  <script type="module" src="scripts/login_functions.js" defer></script>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-right">
      <div class="hero">
        <div class="hero-content">
          <div class="hero-title">CLOCK IN</div>
          <p class="hero-sub">See what is going on with your business</p>
        </div>
      </div>
    </div>

    <div class="auth-left">
      <div class="login-container">
        <main>
          <form class="login-form" id="loginForm" action="#" method="get" novalidate>
            <h2 class="form-title">Login to your Account</h2>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="email@example.com">

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">

            <div class="form-row">
              <label class="remember">
                <input type="checkbox" name="remember"> Remember me
              </label>
              <a class="forgot" href="#">Forgot?</a>
            </div>

            <button type="submit" class="btn">Login</button>
          </form>
        </main>
      </div>
    </div>
  </div>
</body>
</html>
