<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/assets/img/clockin-logo.svg">
  <title>Code Sent â€” ClockIn</title>
  <link rel="stylesheet" href="../styles/login_ui.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
</head>
<body>
  <header class="auth-header">
    <div class="logo">
      <img src="../../../assets/img/clockin-logo.svg" alt="ClockIn Logo">
      <span>Clock In</span>
    </div>
  </header>

  <div class="login-wrapper">
    <div class="login-container">
      <div class="auth-wrapper">
        <div class="login-form" style="text-align: center;">
          <p class="form-title" style="color: #FF725E; margin-bottom: 8px;">Code Sent</p>
          <p class="form-sub" style="color: #000;">We sent a 6-digit code to <span id="userEmail"></span>.<br>Please enter it on the next screen.</p>
          
          <a href="reset_pass.html" class="btn" style="display: inline-block; width: auto; padding: 14px 40px; text-decoration: none;">Proceed to Reset</a>
        </div>
      </div>
    </div>
  </div>

  <footer class="auth-footer">
    <div class="footer-links">
      <a href="Policies/terms.html">Terms of Service</a>
      <span>|</span>
      <a href="Policies/privacy_policy.html">Privacy Policy</a>
    </div>
    <div class="copyright">
      <span class="material-symbols-outlined">copyright</span> 2026 Clock In
    </div>
  </footer>

  <script>
    document.getElementById('userEmail').textContent = sessionStorage.getItem('resetEmail') || '';
  </script>
</body>
</html>
