<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/assets/img/icons/clockin-logo.svg">
  <title>Login - ClockIn</title>
  <link rel="stylesheet" href="/views/login_path/styles/login_ui.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/scripts/core/supabase_config.js"></script>
  <script src="/assets/js/scripts/login/login_functions.js" defer></script>
  <script>
    function togglePasswordVisibility(inputId, toggleIcon) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        toggleIcon.src = '/assets/img/icons/visibility-off.svg';
      } else {
        input.type = 'password';
        toggleIcon.src = '/assets/img/icons/visibility.svg';
      }
    }

    let alertTimeout;

    function showAlertPrompt(message, type = 'error') {
      const alertEl = document.getElementById('alertPrompt');
      const messageEl = alertEl.querySelector('.alert-prompt-message');
      messageEl.textContent = message;
      alertEl.className = 'alert-prompt ' + type;
      alertEl.classList.add('show');
      if (alertTimeout) clearTimeout(alertTimeout);
      alertTimeout = setTimeout(() => closeAlertPrompt(), 5000);
    }

    function closeAlertPrompt() {
      const alertEl = document.getElementById('alertPrompt');
      alertEl.classList.remove('show');
      if (alertTimeout) { clearTimeout(alertTimeout); alertTimeout = null; }
    }
  </script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/ldrs/dist/auto/ring.js"></script>
</head>
<body>
  <div id="page-loader"><l-ring size="50" speed="2" color="#FF725E"></l-ring></div>
  <script>window.addEventListener('load', () => { const l = document.getElementById('page-loader'); if (l) l.classList.add('hidden'); });</script>

  <div id="alertPrompt" class="alert-prompt">
    <span class="alert-prompt-message"></span>
    <button class="alert-prompt-close" onclick="closeAlertPrompt()">
      <img src="/assets/img/icons/close.svg" class="svg-icon" alt="close">
    </button>
  </div>

  <header class="auth-header">
    <div class="logo">
      <img src="/assets/img/icons/clockin-logo.svg" alt="ClockIn Logo">
      <span>Clock In</span>
    </div>
  </header>

  <main class="login-wrapper">
    <div class="login-container">
      <div class="auth-wrapper">
        <form class="login-form" id="loginForm" action="#" method="get" novalidate>
          <h2 class="form-title">Login to your Account</h2>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="email@example.com">

          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" required placeholder="********">
            <img src="/assets/img/icons/visibility.svg" class="svg-icon password-toggle" alt="visibility" onclick="togglePasswordVisibility('password', this)">
          </div>

          <div style="text-align: right; margin-bottom: 16px;">
            <a class="forgot" href="/views/login_path/reset/reset_code.html">Forgot Password?</a>
          </div>

          <button type="submit" class="btn">Login</button>
        </form>
      </div>
    </div>
  </main>

  <footer class="auth-footer">
    <div class="footer-links">
      <a href="/views/login_path/policy/terms.html">Terms of Service</a>
      <span>|</span>
      <a href="/views/login_path/policy/privacy_policy.html">Privacy Policy</a>
    </div>
    <div class="copyright">
      <img src="/assets/img/icons/copyright.svg" class="svg-icon" alt="copyright"> 2026 Clock In
    </div>
  </footer>
</body>
</html>
