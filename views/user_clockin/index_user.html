<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../../helper/asset_helper.css">
  <link rel="stylesheet" href="../../assets/css/pages/user-topbar.css">
  <meta charset=”UTF-8”>
  <meta name=”viewport” content=”width=device-width, initial-scale=1.0”>
  <link rel=”icon” type=”image/svg+xml” href=”/assets/img/clockin-logo.svg”>
  <title>ClockIn - User Dashboard</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../assets/js/scripts/core/supabase_config.js"></script>
  <script src="../../assets/js/scripts/core/authentication.js"></script>
  <script src="../../config/routes.js" defer></script>
  <script src="../../config/app.js" defer></script>
  <script defer>
    document.addEventListener('DOMContentLoaded', () => Router.init(UserRoutes));
  </script>
</head>
<body data-allow-employees="true">

<div class="app">
  <aside class="sidebar collapsed" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <img src="../../assets/img/clockin-logo.svg" alt="ClockIn Logo" class="brand-logo">
        <span class="brand-text">ClockIn</span>
      </div>
      <button class="hamburger" id="hamburger">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>

    <nav class="menu">
      <a href="home_user.html" data-url="home_user.html" class="active">
        <span class="material-symbols-outlined">home</span>
        <span class="label">Home</span>
      </a>
      <a href="checkin_user.html" data-url="checkin_user.html">
        <span class="material-symbols-outlined">login</span>
        <span class="label">Check In/Out</span>
      </a>
      <a href="schedule_user.html" data-url="schedule_user.html">
        <span class="material-symbols-outlined">calendar_month</span>
        <span class="label">Schedule</span>
      </a>
      <a href="attendance_user.html" data-url="attendance_user.html">
        <span class="material-symbols-outlined">how_to_reg</span>
        <span class="label">Attendance</span>
      </a>
      <a href="feedback_user.html" data-url="feedback_user.html">
        <span class="material-symbols-outlined">feedback</span>
        <span class="label">Feedback</span>
      </a>
      <a href="notification_user.html" data-url="notification_user.html">
        <span class="material-symbols-outlined">notifications</span>
        <span class="label">Notifications</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="#" id="sidebarLogout">
        <span class="material-symbols-outlined">logout</span>
        <span class="label">Logout</span>
      </a>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="search-bar-wrapper">
        <span class="search-icon material-symbols-outlined">search</span>
        <input type="text" id="sectionSearch" placeholder="Search..." autocomplete="off">
        <div id="searchResults" class="search-results"></div>
      </div>
      <div class="profile-wrapper">
        <div class="profile-circle" id="profileCircle">?</div>
        <div class="profile-menu" id="profileMenu">
          <div class="profile-header">
            <div class="profile-circle" id="profileCircleMenu">?</div>
            <div class="profile-text">
              <div class="profile-name" id="profileName">User</div>
              <div class="profile-email" id="profileEmail"></div>
            </div>
          </div>
          <hr>
          <a class="menu-item" href="#" onclick="Router.navigateTo('user_profile.html'); return false;">
            <span class="material-symbols-outlined">person</span>
            Profile
          </a>
          <hr>
          <button class="menu-item logout" id="logoutBtn">
            <span class="material-symbols-outlined">logout</span>
            Logout
          </button>
        </div>
      </div>
    </header>
    
    <iframe name="contentFrame" src="home_user.html" frameborder="0" id="contentFrame"></iframe>
  </div>
</div>

</body>
</html>
