<!doctype html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../../helper/asset_helper.css">
  <meta charset="utf-8">
  <title>Schedule — ClockIn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/assets/img/clockin-logo.svg">

  <link rel="stylesheet" href="../../assets/css/pages/schedule-detail.css">
  <link rel="stylesheet" href="../../assets/css/pages/users-table.css">
  <link rel="stylesheet" href="../../assets/css/pages/schedule-cards.css">

  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
   
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../assets/js/scripts/core/supabase_config.js" defer></script>
  <script src="../../assets/js/scripts/core/auth-guard.js"></script>
  <script src="../../assets/js/scripts/admin/managers/schedule_overview.js" defer></script>
  <script src="../../assets/js/scripts/admin/managers/paginate.js" defer></script>
  <script src="../../assets/js/scripts/admin/managers/data-table.js" defer></script>
  <script src="../../assets/js/scripts/admin/export_data.js"></script>
  <script src="../../assets/js/scripts/admin/import_data.js"></script>
  <script src="../../assets/js/scripts/admin/user_management/schedule_db.js" defer></script>
  <script src="../../assets/js/scripts/admin/filter/filter_user.js" defer></script>
</head>

<body data-page="schedule_db">

<div class="app">
  <div class="main">
    <main class="content">

      <div class="dashboard-header">
        <div class="dashboard-title-wrapper">
            <div>
              <h1>Schedules</h1>
              <p class="tagline">View and manage class/work schedules.</p>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
              <div class="dropdown-wrapper">
                <button class="export-btn" id="exportBtn" onclick="toggleExportMenu()">
                  <span class="material-symbols-outlined">download</span>
                  Export
                </button>
                <div id="exportMenu" class="action-dropdown" style="display: none;">
                  <button class="action-dropdown-item" onclick="exportToCSV()">
                    <span class="material-symbols-outlined">table_chart</span>
                    Export as CSV
                  </button>
                  <button class="action-dropdown-item" onclick="exportToJSON()">
                    <span class="material-symbols-outlined">code</span>
                    Export as JSON
                  </button>
                </div>
              </div>
              <div class="dropdown-wrapper">
                <button class="add-user-btn" id="importScheduleBtn" onclick="toggleImportScheduleMenu()">
                  <span class="material-symbols-outlined">upload</span>
                  Import
                </button>
                <div id="importScheduleMenu" class="action-dropdown action-dropdown-orange" style="display: none;">
                  <button class="action-dropdown-item" onclick="event.stopPropagation(); importSchedulesFromCSV()">
                    <span class="material-symbols-outlined">table_chart</span>
                    Import from CSV
                  </button>
                  <button class="action-dropdown-item" onclick="event.stopPropagation(); importSchedulesFromJSON()">
                    <span class="material-symbols-outlined">code</span>
                    Import from JSON
                  </button>
                </div>
              </div>
            </div>
          </div>
      </div>

      <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 0 0 20px 0;">
        
      <div class="users-table-container">
        <div class="table-header">
          <div class="table-actions-left">
            <div class="search-username-wrapper">
              <input type="text" id="searchUsernameInput" class="search-username-input" placeholder="Search Username" oninput="searchUsername(this.value)" autocomplete="off">
            </div>
            <div class="table-filter-wrapper">
              <button class="filter-btn" onclick="toggleFilterMenu()">
                <span class="material-symbols-outlined">filter_list</span>
                Filter
              </button>
              <div id="filterMenu" class="filter-dropdown filter-dropdown-grey" style="display: none;">
                <div id="activeFilters"></div>
                <hr class="filter-separator">
                <div class="filter-footer">
                  <button class="filter-btn add-filter-btn" onclick="addFilterRow()">
                    <span class="material-symbols-outlined">add</span>
                    Add Filter
                  </button>
                  <div class="filter-actions">
                    <button class="export-btn" onclick="applyFilters()">Apply</button>
                  </div>
                </div>
              </div>
            </div>
            <div class="table-filter-wrapper">
              <button class="filter-btn" onclick="toggleSortMenu()">
                <span class="material-symbols-outlined">sort</span>
                Sort
              </button>
              <div id="sortMenu" class="filter-dropdown filter-dropdown-grey" style="display: none;">
                <div id="activeSorts"></div>
                <hr class="filter-separator">
                <div class="filter-footer">
                  <button class="filter-btn add-filter-btn" onclick="addSortRow()">
                    <span class="material-symbols-outlined">add</span>
                    Add Sort
                  </button>
                  <div class="filter-actions">
                    <button class="export-btn" onclick="applySort()">Sort</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="table-info">
            <span id="filterStatus"></span>
          </div>
        </div>
        <div id="selectionActionRow" class="selection-action-row" style="display: none;">
          <div class="selection-info">
            <span id="selectedCount">0</span> row(s) selected
          </div>
          <div class="selection-actions">
            <button class="selection-action-btn export-btn" onclick="exportSelectedRows()">
              <span class="material-symbols-outlined">download</span>
              Export CSV
            </button>
            <button class="selection-action-btn export-btn" onclick="exportSelectedRowsJSON()">
              <span class="material-symbols-outlined">code</span>
              Export JSON
            </button>
            <button class="selection-action-btn" onclick="clearSelection()">
              <span class="material-symbols-outlined">close</span>
              Clear
            </button>
          </div>
        </div>
        <table class="users-table">
          <thead>
            <tr>
              <th class="checkbox-col"><div class="select-all-checkbox" id="selectAllSchedules" onclick="toggleSelectAll()"><span class="material-symbols-outlined">remove</span></div></th>
              <th>Username</th>
              <th>Email</th>
              <th>Employment</th>
              <th>Total Schedules</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="schedulesList">
          </tbody>
        </table>
        <div class="pagination-container" style="display: flex; justify-content: space-between; align-items: center;">
          <div class="pagination-left">
            <span>Show</span>
            <input type="number" id="itemsPerPageInput" class="items-per-page-input" value="10" min="1" onchange="changeItemsPerPage(this.value)">
            <span>from <span id="totalSchedulesCount">0</span> data</span>
          </div>
          <div class="pagination-right">
            <button class="btn-outline pagination-btn" onclick="goToFirstPage()" id="firstBtn">
              <span class="material-symbols-outlined">first_page</span>
            </button>
            <button class="btn-outline pagination-btn" onclick="changePage(-1)" id="prevBtn">
              <span class="material-symbols-outlined">chevron_left</span>
            </button>
            <input type="number" id="pageNumberInput" class="page-number-input" value="1" onchange="goToPage(this.value)">
            <button class="btn-outline pagination-btn" onclick="changePage(1)" id="nextBtn">
              <span class="material-symbols-outlined">chevron_right</span>
            </button>
            <button class="btn-outline pagination-btn" onclick="goToLastPage()" id="lastBtn">
              <span class="material-symbols-outlined">last_page</span>
            </button>
          </div>
        </div>
      </div>

    </main>
  </div>

</div>

</body>
</html>
