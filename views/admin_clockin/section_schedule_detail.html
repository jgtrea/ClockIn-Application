<!doctype html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../../helper/asset_helper.css">
  <meta charset="utf-8">
  <title>Section Schedule — ClockIn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/assets/img/icons/clockin-logo.svg">

  <link rel="stylesheet" href="../../assets/css/pages/schedule-detail.css">
  <link rel="stylesheet" href="../../assets/css/pages/users-table.css">
  <link rel="stylesheet" href="../../assets/css/pages/confirm-dialog.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../assets/js/scripts/core/supabase_config.js" defer></script>
  <script src="../../assets/js/scripts/core/auth-guard.js"></script>
  <script src="../../assets/js/scripts/admin/managers/paginate.js" defer></script>
  <script src="../../assets/js/scripts/admin/export_data.js"></script>
  <script src="../../assets/js/scripts/admin/qr_code.js"></script>
  <script src="../../assets/js/scripts/admin/import_data.js"></script>
  <script src="../../assets/js/scripts/admin/section_schedule_detail.js" defer></script>
</head>

<body data-page="section_schedule_detail">

<div class="app">
  <div class="main">
    <main class="content">

      <div class="dashboard-header">
        <div class="dashboard-title-wrapper">
          <div>
            <button class="btn-outline" onclick="window.location.href='section_schedules.html'" style="margin-bottom: 12px;">
              <img src="/assets/img/icons/arrow-back.svg" class="svg-icon" alt="arrow_back">
              Back to Sections
            </button>
            <h1 id="sectionName">Section Schedule</h1>
            <p class="tagline" id="sectionInfo"></p>
          </div>
          <div style="display: flex; gap: 8px; align-items: center;">
            <button class="export-btn" id="qrCodeBtn" onclick="showQRPrompt(sectId, sectionName)">
              <img src="/assets/img/icons/qr-code.svg" class="svg-icon" alt="qr_code">
              QR Code
            </button>
            <div class="dropdown-wrapper">
              <button class="export-btn" id="exportBtn" onclick="toggleExportMenu()">
                <img src="/assets/img/icons/download.svg" class="svg-icon" alt="download">
                Export
              </button>
              <div id="exportMenu" class="action-dropdown" style="display: none;">
                <button class="action-dropdown-item" onclick="exportAllSchedulesCSV()">
                  <img src="/assets/img/icons/table-chart.svg" class="svg-icon" alt="table_chart">
                  Export as CSV
                </button>
                <button class="action-dropdown-item" onclick="exportAllSchedulesJSON()">
                  <img src="/assets/img/icons/code.svg" class="svg-icon" alt="code">
                  Export as JSON
                </button>
              </div>
            </div>
            <div class="dropdown-wrapper">
              <button class="add-user-btn" id="addSubjectBtn" onclick="toggleAddSubjectMenu()">
                <img src="/assets/img/icons/add.svg" class="svg-icon" alt="add">
                Add Subject
              </button>
              <div id="addSubjectMenu" class="action-dropdown action-dropdown-orange" style="display: none;">
                <button class="action-dropdown-item" onclick="showAddSubjectModal()">
                  <img src="/assets/img/icons/playlist-add.svg" class="svg-icon" alt="playlist_add">
                  Add New Subject
                </button>
                <button class="action-dropdown-item" onclick="event.stopPropagation(); toggleImportMenu()">
                  <img src="/assets/img/icons/upload.svg" class="svg-icon" alt="upload">
                  Import Data
                </button>
              </div>
              <div id="importMenu" class="action-dropdown" style="display: none; position: absolute; right: 0; top: 100%; margin-top: 4px;">
                <button class="action-dropdown-item" onclick="event.stopPropagation(); importSchedulesFromCSV()">
                  <img src="/assets/img/icons/table-chart.svg" class="svg-icon" alt="table_chart">
                  Import from CSV
                </button>
                <button class="action-dropdown-item" onclick="event.stopPropagation(); importSchedulesFromJSON()">
                  <img src="/assets/img/icons/code.svg" class="svg-icon" alt="code">
                  Import from JSON
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 0 0 20px 0;">

      <div class="users-table-container" style="overflow: visible;">
        <div class="table-header">
          <div class="table-actions-left">
            <div class="search-username-wrapper">
              <input type="text" id="searchScheduleInput" class="search-username-input" placeholder="Search..." oninput="searchScheduleDetail(this.value)" autocomplete="off">
            </div>
            <div class="table-filter-wrapper">
              <button class="filter-btn" onclick="toggleFilterMenu()">
                <img src="/assets/img/icons/filter-list.svg" class="svg-icon" alt="filter_list">
                Filter
              </button>
              <div id="sectionDayFilterMenu" class="filter-dropdown filter-dropdown-grey" style="display: none; z-index: 1000;">
                <div id="activeFilters"></div>
                <hr class="filter-separator">
                <div class="filter-footer">
                  <button class="filter-btn add-filter-btn" onclick="addFilterRow()">
                    <img src="/assets/img/icons/add.svg" class="svg-icon" alt="add">
                    Add Filter
                  </button>
                  <div class="filter-actions">
                    <button class="export-btn" onclick="applyFilters()">Apply</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="table-info">
            <span id="filterStatus"></span>
          </div>
        </div>
        
        <div id="selectionActions" class="selection-action-row" style="display: none;">
          <div class="selection-info">
            <span id="selectedCount">0</span> row(s) selected
          </div>
          <div class="selection-actions">
            <button class="selection-action-btn export-btn" onclick="exportSelectedSchedulesCSV()">
              <img src="/assets/img/icons/download.svg" class="svg-icon" alt="download">
              Export CSV
            </button>
            <button class="selection-action-btn export-btn" onclick="exportSelectedSchedulesJSON()">
              <img src="/assets/img/icons/code.svg" class="svg-icon" alt="code">
              Export JSON
            </button>
            <button class="selection-action-btn delete-btn" onclick="deleteSelectedSchedules()">
              <img src="/assets/img/icons/delete.svg" class="svg-icon" alt="delete">
              Delete
            </button>
          </div>
        </div>
        
        <div class="select-all-wrapper" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: white; border-radius: 8px; margin: 0 16px;">
          <div class="select-all-checkbox" id="selectAllSchedules" onclick="toggleSelectAll()">
            <img src="/assets/img/icons/remove.svg" class="svg-icon" alt="remove">
          </div>
          <span style="font-size: 14px; color: #64748b; line-height: normal;">Select All</span>
        </div>
      </div>

      <div class="add-schedule-form" style="display: none;">
        <div class="form-row">
          <div class="form-field">
            <label>Employee</label>
            <input type="text" id="addEmployee" class="form-input" list="employeeList" placeholder="Enter employee name">
            <datalist id="employeeList"></datalist>
          </div>
          <div class="form-field">
            <label>Weekday</label>
            <select id="addWeekday" class="form-input">
              <option value="Monday">Monday</option>
              <option value="Tuesday">Tuesday</option>
              <option value="Wednesday">Wednesday</option>
              <option value="Thursday">Thursday</option>
              <option value="Friday">Friday</option>
              <option value="Saturday">Saturday</option>
              <option value="Sunday">Sunday</option>
              <option value="AllWeekdays">All Weekdays (Mon-Fri)</option>
            </select>
          </div>
          <div class="form-field">
            <label>Start Time</label>
            <input type="time" id="addStartTime" class="form-input">
          </div>
          <div class="form-field">
            <label>End Time</label>
            <input type="time" id="addEndTime" class="form-input">
          </div>
          <div class="form-field">
            <label>Subject</label>
            <input type="text" id="addSubject" class="form-input" list="subjectList" placeholder="Select or type subject">
            <datalist id="subjectList"></datalist>
          </div>
          <div class="form-field-button">
            <button class="add-user-btn" onclick="saveSchedule()">
              <img src="/assets/img/icons/add.svg" class="svg-icon" alt="add">
              Add
            </button>
          </div>
        </div>
      </div>

      <div id="schedulesByDayContainer" style="margin-top: 20px;">
      </div>

    </main>
  </div>
</div>

<div id="deleteConfirmDialog" class="confirm-dialog-overlay" style="display: none;">
  <div class="confirm-dialog">
    <div class="confirm-dialog-header">
      <img src="/assets/img/icons/delete-warning.svg" class="svg-icon confirm-dialog-icon" alt="delete_warning">
      <h3>Delete Schedule</h3>
    </div>
    <div class="confirm-dialog-body">
      <p>What would you like to do?</p>
      <div class="confirm-dialog-options">
        <button class="confirm-dialog-btn full-schedule-btn" onclick="confirmDeleteSchedule('full')">
          <img src="/assets/img/icons/delete-forever.svg" class="svg-icon" alt="delete_forever">
          Remove Entire Schedule
        </button>
        <button class="confirm-dialog-btn teacher-only-btn" onclick="confirmDeleteSchedule('teacher')">
          <img src="/assets/img/icons/person-remove.svg" class="svg-icon" alt="person_remove">
          Remove Teacher Only
        </button>
      </div>
      <p class="confirm-dialog-hint">The schedule will remain for other teachers.</p>
    </div>
    <div class="confirm-dialog-footer">
      <button class="confirm-dialog-btn cancel-btn" onclick="closeDeleteDialog()">Cancel</button>
    </div>
  </div>
</div>

<div id="addSubjectModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
  <div class="modal-content" style="background: white; margin: 5% auto; padding: 24px; border-radius: 12px; width: 400px; max-width: 90%;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2 style="margin: 0; font-size: 20px; color: #1e293b;">Add New Subject</h2>
      <button onclick="closeAddSubjectModal()" style="background: none; border: none; cursor: pointer; padding: 4px; color: #64748b;">
        <img src="/assets/img/icons/close.svg" class="svg-icon" alt="close">
      </button>
    </div>
    <form id="addSubjectForm" onsubmit="event.preventDefault(); addNewSubject();">
      <div style="margin-bottom: 16px;">
        <label style="display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: #374151;">Subject</label>
        <input type="text" id="newSubjectName" style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
      </div>
      <div style="margin-bottom: 16px;">
        <label style="display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: #374151;">Weekday</label>
        <select id="newScheduleWeekday" style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box; background: white;">
          <option value="AllWeekdays">All Weekdays (Mon-Fri)</option>
          <option value="Monday">Monday</option>
          <option value="Tuesday">Tuesday</option>
          <option value="Wednesday">Wednesday</option>
          <option value="Thursday">Thursday</option>
          <option value="Friday">Friday</option>
        </select>
      </div>
      <div style="display: flex; gap: 12px; margin-bottom: 16px;">
        <div style="flex: 1;">
          <label style="display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: #374151;">Start Time</label>
          <input type="time" id="newScheduleStartTime" style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
        </div>
        <div style="flex: 1;">
          <label style="display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: #374151;">End Time</label>
          <input type="time" id="newScheduleEndTime" style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
        </div>
      </div>
      <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: #374151;">Teacher</label>
        <input type="text" id="newScheduleTeacher" style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box;" placeholder="Select or type teacher name" list="employeeListModal">
        <datalist id="employeeListModal"></datalist>
      </div>
      <div style="display: flex; gap: 12px; justify-content: flex-end;">
        <button type="button" onclick="closeAddSubjectModal()" style="padding: 10px 20px; border: 1px solid #d1d5db; background: white; border-radius: 8px; cursor: pointer; font-size: 14px; color: #374151;">Cancel</button>
        <button type="submit" style="padding: 10px 20px; background: #f97316; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;">Add Subject</button>
      </div>
    </form>
  </div>
</div>

<script>
function toggleFilterMenu() {
  const menu = document.getElementById('sectionDayFilterMenu');
  const filterWrapper = document.querySelector('.table-filter-wrapper:first-child');
  const isOpen = menu && menu.style.display === 'block';
  
  if (menu) {
    menu.style.display = isOpen ? 'none' : 'block';
  }
  
  if (filterWrapper) {
    filterWrapper.classList.toggle('active', !isOpen);
  }
}

function addFilterRow() {
  const activeFilters = document.getElementById('activeFilters');
  const filterRow = document.createElement('div');
  filterRow.className = 'filter-row';
  
  filterRow.innerHTML = `
    <select class="filter-column-select">
      <option value="weekday">Weekday</option>
      <option value="startTime">Start Time</option>
      <option value="endTime">End Time</option>
      <option value="subject">Subject</option>
      <option value="teacher">Teacher</option>
    </select>
    <span>:</span>
    <input type="text" class="filter-value-input" placeholder="Enter value...">
    <button class="remove-filter-btn" onclick="event.stopPropagation(); this.parentElement.remove()">
      <img src="/assets/img/icons/close.svg" class="svg-icon" alt="close">
    </button>
  `;
  
  activeFilters.appendChild(filterRow);
}

function applyFilters() {
  const filterRows = document.querySelectorAll('#activeFilters .filter-row');
  const filters = [];
  
  filterRows.forEach(row => {
    const select = row.querySelector('select');
    const input = row.querySelector('input');
    if (select && input && input.value.trim()) {
      filters.push({
        column: select.value,
        value: input.value.trim().toLowerCase()
      });
    }
  });
  
  const allSchedules = window.allSchedules || [];
  
  let filteredSchedules;
  if (filters.length === 0) {
    filteredSchedules = allSchedules;
    const filterStatus = document.getElementById('filterStatus');
    if (filterStatus) filterStatus.textContent = '';
  } else {
    filteredSchedules = allSchedules.filter(schedule => {
      return filters.every(filter => {
        let cellValue = '';
        if (filter.column === 'weekday') {
          cellValue = schedule.weekday || '';
        } else if (filter.column === 'startTime') {
          cellValue = schedule.startTime || '';
        } else if (filter.column === 'endTime') {
          cellValue = schedule.endTime || '';
        } else if (filter.column === 'subject') {
          cellValue = schedule.subject || '';
        } else if (filter.column === 'teacher') {
          cellValue = schedule.user_employee_data?.name || '';
        }
        return String(cellValue).toLowerCase().includes(filter.value);
      });
    });
    const filterStatus = document.getElementById('filterStatus');
    if (filterStatus) filterStatus.textContent = `Filtered (${filters.length})`;
  }
  
  if (typeof renderSchedule === 'function') {
    renderSchedule(filteredSchedules);
  }
  
  toggleFilterMenu();
}

function toggleSectionDayFilter() {
  toggleFilterMenu();
}

function filterSectionByDay() {
  applyFilters();
}

// Dropdown menu functions
function toggleExportMenu() {
  const menu = document.getElementById('exportMenu');
  const addMenu = document.getElementById('addSubjectMenu');
  const importMenu = document.getElementById('importMenu');
  
  // Close other menus first
  if (addMenu) addMenu.style.display = 'none';
  if (importMenu) importMenu.style.display = 'none';
  
  // Toggle export menu
  if (menu) {
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
  }
}

function toggleAddSubjectMenu() {
  const menu = document.getElementById('addSubjectMenu');
  const exportMenu = document.getElementById('exportMenu');
  const importMenu = document.getElementById('importMenu');
  
  // Close other menus first
  if (exportMenu) exportMenu.style.display = 'none';
  if (importMenu) importMenu.style.display = 'none';
  
  // Toggle add subject menu
  if (menu) {
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
  }
}

function toggleImportMenu() {
  const menu = document.getElementById('importMenu');
  const exportMenu = document.getElementById('exportMenu');
  const addMenu = document.getElementById('addSubjectMenu');
  
  // Close other menus first
  if (exportMenu) exportMenu.style.display = 'none';
  if (addMenu) addMenu.style.display = 'none';
  
  // Toggle import menu
  if (menu) {
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
  }
}

function showAddSubjectModal() {
  const menu = document.getElementById('addSubjectMenu');
  if (menu) menu.style.display = 'none';
  
  const modal = document.getElementById('addSubjectModal');
  if (modal) {
    modal.style.display = 'block';
    document.getElementById('newSubjectName').focus();
    
    const employeeDatalist = document.getElementById('employeeListModal');
    const existingEmployeeList = document.getElementById('employeeList');
    
    if (employeeDatalist) {
      if (window.allEmployees && window.allEmployees.length > 0) {
        employeeDatalist.innerHTML = window.allEmployees.map(e => `<option value="${e.name}">`).join('');
      } else if (existingEmployeeList && existingEmployeeList.options.length > 0) {
        employeeDatalist.innerHTML = existingEmployeeList.innerHTML;
      }
    }
  }
}

function closeAddSubjectModal() {
  const modal = document.getElementById('addSubjectModal');
  if (modal) {
    modal.style.display = 'none';
  }
  const form = document.getElementById('addSubjectForm');
  if (form) form.reset();
  
  document.getElementById('newScheduleWeekday').value = 'Monday';
  document.getElementById('newScheduleStartTime').value = '';
  document.getElementById('newScheduleEndTime').value = '';
  document.getElementById('newScheduleTeacher').value = '';
}

function addNewSubject() {
  const subject = document.getElementById('newSubjectName').value.trim();
  const weekday = document.getElementById('newScheduleWeekday').value;
  const startTime = document.getElementById('newScheduleStartTime').value;
  const endTime = document.getElementById('newScheduleEndTime').value;
  const teacherName = document.getElementById('newScheduleTeacher').value.trim();
  
  const urlParams = new URLSearchParams(window.location.search);
  const sectionId = urlParams.get('sectId') || urlParams.get('id');
  
  if (!sectionId) {
    alert('Section ID not found');
    return;
  }
  
  let employeeId = null;
  if (teacherName) {
    const employees = window.allEmployees || [];
    const employee = employees.find(e => e.name.toLowerCase() === teacherName.toLowerCase());
    employeeId = employee ? employee.employeeId : null;
  }
  
  if (typeof supabase !== 'undefined' && typeof window.supabaseClient !== 'undefined') {
    const supabase = window.supabaseClient;
    
    supabase.from('schedule').insert({
      sectId: sectionId,
      employeeId: employeeId,
      weekday: weekday,
      startTime: startTime,
      endTime: endTime,
      subject: subject
    }).then(({ data, error }) => {
      if (error) {
        console.error('Error adding schedule:', error);
        alert('Error adding schedule: ' + error.message);
      } else {
        closeAddSubjectModal();
        window.location.reload();
      }
    });
  } else {
    alert('Database not initialized');
  }
}

// Close dropdowns and modal when clicking outside
document.addEventListener('click', function(e) {
  // Close export menu
  const exportBtn = document.getElementById('exportBtn');
  const exportMenu = document.getElementById('exportMenu');
  if (exportBtn && exportMenu && !exportBtn.contains(e.target) && !exportMenu.contains(e.target)) {
    exportMenu.style.display = 'none';
  }
  
  // Close add subject menu
  const addSubjectBtn = document.getElementById('addSubjectBtn');
  const addSubjectMenu = document.getElementById('addSubjectMenu');
  if (addSubjectBtn && addSubjectMenu && !addSubjectBtn.contains(e.target) && !addSubjectMenu.contains(e.target)) {
    addSubjectMenu.style.display = 'none';
  }
  
  // Close import menu
  const importMenu = document.getElementById('importMenu');
  if (importMenu && importMenu.style.display === 'block') {
    const addSubjectBtn2 = document.getElementById('addSubjectBtn');
    if (addSubjectBtn2 && !importMenu.contains(e.target) && !addSubjectBtn2.contains(e.target)) {
      importMenu.style.display = 'none';
    }
  }
  
  // Close filter menu when clicking outside
  const filterWrapper = document.querySelector('.table-filter-wrapper');
  if (filterWrapper && !filterWrapper.contains(e.target)) {
    const menu = document.getElementById('sectionDayFilterMenu');
    if (menu) menu.style.display = 'none';
  }
  
  // Close modal when clicking outside
  const modal = document.getElementById('addSubjectModal');
  if (modal && e.target === modal) {
    closeAddSubjectModal();
  }
});

function filterSectionByDay() {
  const checkboxes = document.querySelectorAll('#sectionDayFilterMenu input[type="checkbox"]:checked');
  const selectedDays = Array.from(checkboxes).map(cb => cb.value);
  
  const scheduleRows = document.querySelectorAll('.schedule-day-section');
  scheduleRows.forEach(section => {
    const dayName = section.getAttribute('data-day');
    if (selectedDays.length === 0 || selectedDays.includes(dayName)) {
      section.style.display = '';
    } else {
      section.style.display = 'none';
    }
  });
}

function searchScheduleDetail(query) {
  const allSchedules = window.allSchedules || [];
  
  let filteredSchedules;
  if (!query) {
    filteredSchedules = allSchedules;
  } else {
    const term = query.toLowerCase();
    filteredSchedules = allSchedules.filter(schedule => {
      const weekday = (schedule.weekday || '').toLowerCase();
      const subject = (schedule.subject || '').toLowerCase();
      const teacher = (schedule.user_employee_data?.name || '').toLowerCase();
      const startTime = (schedule.startTime || '').toLowerCase();
      const endTime = (schedule.endTime || '').toLowerCase();
      return weekday.includes(term) || subject.includes(term) || teacher.includes(term) || startTime.includes(term) || endTime.includes(term);
    });
  }
  
  if (typeof renderSchedule === 'function') {
    renderSchedule(filteredSchedules);
  }
}

function searchSectionSchedule(query) {
  searchScheduleDetail(query);
}

// Close filter menu when clicking outside
document.addEventListener('click', function(e) {
  const filterWrapper = document.querySelector('.table-filter-wrapper');
  if (filterWrapper && !filterWrapper.contains(e.target)) {
    const menu = document.getElementById('sectionDayFilterMenu');
    if (menu) menu.style.display = 'none';
  }
});
</script>

</body>
</html>
