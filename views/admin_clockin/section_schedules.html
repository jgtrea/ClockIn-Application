<!doctype html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../../helper/asset_helper.css">
  <meta charset="utf-8">
  <title>Sections — ClockIn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/assets/img/clockin-logo.svg">

  <link rel="stylesheet" href="../../assets/css/pages/schedule-detail.css">
  <link rel="stylesheet" href="../../assets/css/pages/users-table.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../assets/js/scripts/core/supabase_config.js" defer></script>
  <script src="../../assets/js/scripts/core/auth-guard.js"></script>
  <script src="../../assets/js/scripts/admin/managers/paginate.js" defer></script>
  <script src="../../assets/js/scripts/admin/managers/data-table.js" defer></script>
  <script src="../../assets/js/scripts/admin/export_data.js"></script>
  <script src="../../assets/js/scripts/admin/qr_code.js"></script>
  <script src="../../assets/js/scripts/admin/import_data.js"></script>
  <script src="../../assets/js/scripts/admin/section_schedules.js" defer></script>
</head>

<body data-page="section_schedules">

<div class="app">
  <div class="main">
    <main class="content">

      <div class="dashboard-header">
        <div class="dashboard-title-wrapper">
          <div>
            <h1>Sections</h1>
            <p class="tagline">View schedules organized by section.</p>
          </div>
          <div style="display: flex; gap: 8px; align-items: center;">
            <div class="dropdown-wrapper">
              <button class="export-btn" id="exportBtn" onclick="toggleExportMenu()">
                <span class="material-symbols-outlined">download</span>
                Export
              </button>
              <div id="exportMenu" class="action-dropdown" style="display: none;">
                <button class="action-dropdown-item" onclick="exportToCSV()">
                  <span class="material-symbols-outlined">table_chart</span>
                  Export as CSV
                </button>
                <button class="action-dropdown-item" onclick="exportToJSON()">
                  <span class="material-symbols-outlined">code</span>
                  Export as JSON
                </button>
              </div>
            </div>
            <div class="dropdown-wrapper">
              <button class="add-user-btn" id="addSectionBtn" onclick="toggleAddSectionMenu()">
                <span class="material-symbols-outlined">add</span>
                Add Section
              </button>
              <div id="addSectionMenu" class="action-dropdown action-dropdown-orange" style="display: none;">
                <button class="action-dropdown-item" onclick="showAddSectionModal()">
                  <span class="material-symbols-outlined">person_add</span>
                  Add New Section
                </button>
                <button class="action-dropdown-item" onclick="event.stopPropagation(); showImportMenu()">
                  <span class="material-symbols-outlined">upload</span>
                  Import Data
                </button>
              </div>
              <div id="importMenu" class="action-dropdown" style="display: none;">
                <button class="action-dropdown-item" onclick="event.stopPropagation(); importSectionsFromCSV()">
                  <span class="material-symbols-outlined">table_chart</span>
                  Import from CSV
                </button>
                <button class="action-dropdown-item" onclick="event.stopPropagation(); importSectionsFromJSON()">
                  <span class="material-symbols-outlined">code</span>
                  Import from JSON
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 0 0 20px 0;">

      <div class="users-table-container">
        <div class="table-header">
          <div class="table-actions-left">
            <div class="search-username-wrapper">
              <input type="text" id="searchSectionInput" class="search-username-input" placeholder="Search Section" oninput="searchSection(this.value)" autocomplete="off">
            </div>
            <div class="table-filter-wrapper">
              <button class="filter-btn" onclick="toggleFilterMenu()">
                <span class="material-symbols-outlined">filter_list</span>
                Filter
              </button>
              <div id="filterMenu" class="filter-dropdown filter-dropdown-grey" style="display: none;">
                <div id="activeFilters"></div>
                <hr class="filter-separator">
                <div class="filter-footer">
                  <button class="filter-btn add-filter-btn" onclick="addFilterRow()">
                    <span class="material-symbols-outlined">add</span>
                    Add Filter
                  </button>
                  <div class="filter-actions">
                    <button class="export-btn" onclick="applyFilters()">Apply</button>
                  </div>
                </div>
              </div>
            </div>
            <div class="table-filter-wrapper">
              <button class="filter-btn" onclick="toggleSortMenu()">
                <span class="material-symbols-outlined">sort</span>
                Sort
              </button>
              <div id="sortMenu" class="filter-dropdown filter-dropdown-grey" style="display: none;">
                <div id="activeSorts"></div>
                <hr class="filter-separator">
                <div class="filter-footer">
                  <button class="filter-btn add-filter-btn" onclick="addSortRow()">
                    <span class="material-symbols-outlined">add</span>
                    Add Sort
                  </button>
                  <div class="filter-actions">
                    <button class="export-btn" onclick="applySort()">Sort</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="table-info">
            <span id="filterStatus"></span>
          </div>
        </div>
        <div id="selectionActionRow" class="selection-action-row" style="display: none;">
          <div class="selection-info">
            <span id="selectedCount">0</span> row(s) selected
          </div>
          <div class="selection-actions">
            <button class="selection-action-btn" onclick="removeAdvisorFromSelected()">
              <span class="material-symbols-outlined">person_remove</span>
              Remove Advisor
            </button>
            <button class="selection-action-btn export-btn" onclick="exportSelectedRows()">
              <span class="material-symbols-outlined">download</span>
              Export CSV
            </button>
            <button class="selection-action-btn export-btn" onclick="exportSelectedRowsJSON()">
              <span class="material-symbols-outlined">code</span>
              Export JSON
            </button>
            <button class="selection-action-btn" onclick="clearSelection()">
              <span class="material-symbols-outlined">close</span>
              Clear
            </button>
            <button class="selection-action-btn" onclick="deleteSelectedSections()">
              <span class="material-symbols-outlined">delete</span>
              Delete
            </button>
          </div>
        </div>
        <table class="users-table">
          <thead>
            <tr>
              <th class="checkbox-col"><div id="selectAllSections" class="select-all-checkbox" onclick="toggleSelectAll()"><span class="material-symbols-outlined">remove</span></div></th>
              <th>Section Name</th>
              <th>Advisor</th>
              <th>Year Level</th>
              <th>Total Schedules</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="sectionsList">
          </tbody>
        </table>
        <div class="pagination-container" style="display: flex; justify-content: space-between; align-items: center;">
          <div class="pagination-left">
            <span>Show</span>
            <input type="number" id="itemsPerPageInput" class="items-per-page-input" value="10" min="1" onchange="changeItemsPerPage(this.value)">
            <span>from <span id="totalSectionsCount">0</span> data</span>
          </div>
          <div class="pagination-right">
            <button class="btn-outline pagination-btn" onclick="goToFirstPage()" id="firstBtn">
              <span class="material-symbols-outlined">first_page</span>
            </button>
            <button class="btn-outline pagination-btn" onclick="changePage(-1)" id="prevBtn">
              <span class="material-symbols-outlined">chevron_left</span>
            </button>
            <input type="number" id="pageNumberInput" class="page-number-input" value="1" onchange="goToPage(this.value)">
            <button class="btn-outline pagination-btn" onclick="changePage(1)" id="nextBtn">
              <span class="material-symbols-outlined">chevron_right</span>
            </button>
            <button class="btn-outline pagination-btn" onclick="goToLastPage()" id="lastBtn">
              <span class="material-symbols-outlined">last_page</span>
            </button>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Add Section Modal -->
<div id="addSectionModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
  <div class="modal-content" style="background: white; margin: 5% auto; padding: 24px; border-radius: 12px; width: 420px; max-width: 90%;">
    <div style="text-align: center; margin-bottom: 20px;">
      <h2 style="margin: 0; font-size: 20px; font-weight: 600; color: #111827;">Add New Section</h2>
      <button onclick="closeAddSectionModal()" style="position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 24px; cursor: pointer; color: #6b7280;">&times;</button>
    </div>
    <div style="display: flex; flex-direction: column; gap: 16px;">
      <div>
        <label style="display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 6px;">Section Name</label>
        <input type="text" id="addSectionName" placeholder="Enter section name" style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px;">
      </div>
      <div>
        <label style="display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 6px;">Advisor</label>
        <input type="text" id="addAdvisor" list="advisorList" placeholder="Select or type advisor name" style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px;">
        <datalist id="advisorList"></datalist>
      </div>
      <div>
        <label style="display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 6px;">Year Level</label>
        <input type="number" id="addYearLevel" placeholder="Enter year level" style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px;">
      </div>
      <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 8px;">
        <button onclick="closeAddSectionModal()" class="btn-outline" style="padding: 10px 20px; border-radius: 8px;">Cancel</button>
        <button onclick="saveSection()" class="export-btn" style="padding: 10px 20px; border-radius: 8px; background: #FF725E; border: none; color: #fff; font-weight: 600; cursor: pointer;">Add Section</button>
      </div>
    </div>
  </div>
</div>

<script>
// Toggle Add Section Menu
function toggleAddSectionMenu() {
  const menu = document.getElementById('addSectionMenu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
  
  // Close import menu if open
  const importMenu = document.getElementById('importMenu');
  if (importMenu) importMenu.style.display = 'none';
}

// Show Add Section Modal
function showAddSectionModal() {
  const modal = document.getElementById('addSectionModal');
  const menu = document.getElementById('addSectionMenu');
  if (menu) menu.style.display = 'none';
  if (modal) modal.style.display = 'block';
}

// Close Add Section Modal
function closeAddSectionModal() {
  const modal = document.getElementById('addSectionModal');
  if (modal) modal.style.display = 'none';
}

// Show Import Menu
function showImportMenu() {
  const menu = document.getElementById('importMenu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}

// Close menus when clicking outside
document.addEventListener('click', function(e) {
  const addSectionBtn = document.getElementById('addSectionBtn');
  const addSectionMenu = document.getElementById('addSectionMenu');
  const importMenu = document.getElementById('importMenu');
  
  if (addSectionBtn && !addSectionBtn.contains(e.target)) {
    if (addSectionMenu) addSectionMenu.style.display = 'none';
    if (importMenu) importMenu.style.display = 'none';
  }
});
</script>

</body>
</html>
