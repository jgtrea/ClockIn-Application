<!doctype html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../../helper/asset_helper.css">
  <meta charset="utf-8">
  <title>Schedule Details — ClockIn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/assets/img/icons/clockin-logo.svg">

  <link rel="stylesheet" href="../../assets/css/pages/schedule-detail.css">
  <link rel="stylesheet" href="../../assets/css/pages/users-table.css">
  <link rel="stylesheet" href="../../assets/css/pages/confirm-dialog.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../assets/js/scripts/core/supabase_config.js" defer></script>
  <script src="../../assets/js/scripts/core/auth-guard.js"></script>
  <script src="../../assets/js/scripts/admin/export_data.js"></script>
  <script src="../../assets/js/scripts/admin/import_data.js"></script>
  <script src="../../assets/js/scripts/admin/user_management/schedule_detail.js" defer></script>
</head>

<body data-page="schedule_detail">

<div class="app">
  <div class="main">
    <main class="content">

      <div class="dashboard-header">
        <div class="dashboard-title-wrapper">
          <div>
            <button class="btn-outline" onclick="window.location.href='schedule_db.html'" style="margin-bottom: 12px;">
              <img src="/assets/img/icons/arrow-back.svg" class="svg-icon" alt="arrow_back">
              Back to Schedules
            </button>
            <h1 id="userName">Schedule Details</h1>
            <p class="tagline" id="userEmail"></p>
          </div>
          <div style="display: flex; gap: 8px; align-items: center;">
            <div class="dropdown-wrapper">
              <button class="export-btn" id="exportBtn" onclick="toggleExportMenu()">
                <img src="/assets/img/icons/download.svg" class="svg-icon" alt="download">
                Export
              </button>
              <div id="exportMenu" class="action-dropdown" style="display: none;">
                <button class="action-dropdown-item" onclick="exportAllSchedulesCSV()">
                  <img src="/assets/img/icons/table-chart.svg" class="svg-icon" alt="table_chart">
                  Export as CSV
                </button>
                <button class="action-dropdown-item" onclick="exportAllSchedulesJSON()">
                  <img src="/assets/img/icons/code.svg" class="svg-icon" alt="code">
                  Export as JSON
                </button>
              </div>
            </div>
            <div class="dropdown-wrapper">
              <button class="add-user-btn" id="addScheduleBtn" onclick="toggleAddScheduleMenu()">
                <img src="/assets/img/icons/add.svg" class="svg-icon" alt="add">
                Add Schedule
              </button>
              <div id="addScheduleMenu" class="action-dropdown action-dropdown-orange" style="display: none;">
                <button class="action-dropdown-item" onclick="showAddExistingScheduleModal()">
                  <img src="/assets/img/icons/playlist-add.svg" class="svg-icon" alt="playlist_add">
                  Add New Schedule
                </button>
                <button class="action-dropdown-item" onclick="event.stopPropagation(); showImportMenu()">
                  <img src="/assets/img/icons/upload.svg" class="svg-icon" alt="upload">
                  Import Data
                </button>
              </div>
              <div id="importMenu" class="action-dropdown" style="display: none;">
                <button class="action-dropdown-item" onclick="event.stopPropagation(); importSchedulesFromCSV()">
                  <img src="/assets/img/icons/table-chart.svg" class="svg-icon" alt="table_chart">
                  Import from CSV
                </button>
                <button class="action-dropdown-item" onclick="event.stopPropagation(); importSchedulesFromJSON()">
                  <img src="/assets/img/icons/code.svg" class="svg-icon" alt="code">
                  Import from JSON
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 0 0 20px 0;">
      
      <div class="users-table-container" style="overflow: visible;">
        <div class="table-header">
          <div class="table-actions-left">
            <div class="search-username-wrapper">
              <input type="text" id="searchScheduleInput" class="search-username-input" placeholder="Search..." oninput="searchSchedule(this.value)" autocomplete="off">
            </div>
            <div class="table-filter-wrapper">
              <button class="filter-btn" onclick="toggleFilterMenu()">
                <img src="/assets/img/icons/filter-list.svg" class="svg-icon" alt="filter_list">
                Filter
              </button>
              <div id="filterMenu" class="filter-dropdown filter-dropdown-grey" style="display: none; z-index: 1000;">
                <div id="activeFilters"></div>
                <hr class="filter-separator">
                <div class="filter-footer">
                  <button class="filter-btn add-filter-btn" onclick="addFilterRow()">
                    <img src="/assets/img/icons/add.svg" class="svg-icon" alt="add">
                    Add Filter
                  </button>
                  <div class="filter-actions">
                    <button class="export-btn" onclick="applyFilters()">Apply</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="table-info">
            <span id="filterStatus"></span>
          </div>
        </div>
        
        <div id="selectionActionRow" class="selection-action-row" style="display: none;">
          <div class="selection-info">
            <span id="selectedCount">0</span> row(s) selected
          </div>
          <div class="selection-actions">
            <button class="selection-action-btn" onclick="exportSelectedSchedulesCSV()">
              <img src="/assets/img/icons/download.svg" class="svg-icon" alt="download">
              Export CSV
            </button>
            <button class="selection-action-btn" onclick="exportSelectedSchedulesJSON()">
              <img src="/assets/img/icons/code.svg" class="svg-icon" alt="code">
              Export JSON
            </button>
            <button class="selection-action-btn delete-btn" onclick="deleteSelectedSchedules()">
              <img src="/assets/img/icons/delete.svg" class="svg-icon" alt="delete">
              Delete
            </button>
          </div>
        </div>
        
        <div class="select-all-wrapper" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: white; border-radius: 8px; margin: 0 16px 16px 16px;">
          <div class="select-all-checkbox" id="selectAllSchedules" onclick="toggleSelectAll()">
            <img src="/assets/img/icons/remove.svg" class="svg-icon" alt="remove">
          </div>
          <span style="font-size: 14px; color: #64748b; line-height: normal;">Select All</span>
        </div>
      </div>
      
      <datalist id="subjectList"></datalist>
      <datalist id="sectionList"></datalist>
      
      <div id="schedulesByDayContainer" style="margin-top: 20px;">
      </div>

    </main>
  </div>

</div>

<!-- Custom Delete Confirmation Dialog -->
<div id="deleteConfirmDialog" class="confirm-dialog-overlay" style="display: none;">
  <div class="confirm-dialog">
    <div class="confirm-dialog-header">
      <img src="/assets/img/icons/delete-warning.svg" class="svg-icon confirm-dialog-icon" alt="delete_warning">
      <h3>Delete Schedule</h3>
    </div>
    <div class="confirm-dialog-body">
      <p>What would you like to do?</p>
      <div class="confirm-dialog-options">
        <button class="confirm-dialog-btn full-schedule-btn" onclick="confirmDeleteSchedule('full')">
          <img src="/assets/img/icons/delete-forever.svg" class="svg-icon" alt="delete_forever">
          Remove Entire Schedule
        </button>
        <button class="confirm-dialog-btn teacher-only-btn" onclick="confirmDeleteSchedule('teacher')">
          <img src="/assets/img/icons/person-remove.svg" class="svg-icon" alt="person_remove">
          Remove Teacher Only
        </button>
      </div>
      <p class="confirm-dialog-hint">The schedule will remain for other teachers.</p>
    </div>
    <div class="confirm-dialog-footer">
      <button class="confirm-dialog-btn cancel-btn" onclick="closeDeleteDialog()">Cancel</button>
    </div>
  </div>
</div>

<!-- Add Schedule Modal -->
<div id="addExistingScheduleModal" class="confirm-dialog-overlay" style="display: none;">
  <div class="confirm-dialog" style="max-width: 800px; max-height: 80vh; display: flex; flex-direction: column;">
    <div class="confirm-dialog-header">
      <img src="/assets/img/icons/playlist-add.svg" class="svg-icon confirm-dialog-icon" alt="playlist_add" style="color: #FF725E;">
      <h3>Add Schedule</h3>
    </div>
    <div class="modal-filter-bar" style="padding: 12px 16px; border-bottom: 1px solid #e5e7eb; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
      <div class="form-field" style="flex: 1; min-width: 120px; margin-bottom: 0;">
        <label style="font-size: 12px; font-weight: 600; color: #64748b;">Filter by Subject</label>
        <input type="text" id="filterSubject" class="form-input" placeholder="Search subject..." oninput="filterUnassignedSchedules()">
      </div>
      <div class="form-field" style="flex: 1; min-width: 120px; margin-bottom: 0;">
        <label style="font-size: 12px; font-weight: 600; color: #64748b;">Filter by Section</label>
        <input type="text" id="filterSection" class="form-input" placeholder="Select section..." list="filterSectionList" oninput="filterUnassignedSchedules()">
        <datalist id="filterSectionList"></datalist>
      </div>
      <div class="form-field" style="flex: 1; min-width: 120px; margin-bottom: 0;">
        <label style="font-size: 12px; font-weight: 600; color: #64748b;">Filter by Day</label>
        <select id="filterDay" class="form-input" onchange="filterUnassignedSchedules()">
          <option value="">All Days</option>
          <option value="Monday">Monday</option>
          <option value="Tuesday">Tuesday</option>
          <option value="Wednesday">Wednesday</option>
          <option value="Thursday">Thursday</option>
          <option value="Friday">Friday</option>
          <option value="Saturday">Saturday</option>
          <option value="Sunday">Sunday</option>
        </select>
      </div>
      <div class="form-field" style="flex: 1; min-width: 120px; margin-bottom: 0;">
        <label style="font-size: 12px; font-weight: 600; color: #64748b;">Sort by</label>
        <select id="sortBy" class="form-input" onchange="filterUnassignedSchedules()">
          <option value="weekday">Weekday</option>
          <option value="startTime">Start Time</option>
          <option value="subject">Subject</option>
          <option value="section">Section</option>
        </select>
      </div>
    </div>
    <div class="confirm-dialog-body" style="flex: 1; overflow-y: auto; padding: 0;">
      <div id="unassignedSchedulesTableContainer" style="overflow-x: auto;">
        <table class="users-table" style="width: 100%; min-width: 600px;">
          <thead>
            <tr>
              <th class="checkbox-col">
                <input type="checkbox" id="selectAllUnassigned" onchange="toggleSelectAllUnassigned()">
              </th>
              <th>Weekday</th>
              <th>Start Time</th>
              <th>End Time</th>
              <th>Subject</th>
              <th>Section</th>
            </tr>
          </thead>
          <tbody id="unassignedSchedulesList">
          </tbody>
        </table>
        <div id="unassignedLoading" class="loading-spinner" style="padding: 40px;">Loading unassigned schedules...</div>
        <div id="unassignedNoResults" class="no-records" style="display: none;">No matching schedules found.</div>
      </div>
    </div>
    <div class="confirm-dialog-footer" style="flex-shrink: 0; justify-content: space-between;">
      <div style="font-size: 13px; color: #64748b;">
        <span id="selectedCountDisplay">0</span> schedule(s) selected
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="confirm-dialog-btn cancel-btn" onclick="closeAddExistingScheduleModal()" style="width: auto; padding: 10px 20px;">Cancel</button>
        <button class="confirm-dialog-btn" onclick="assignSelectedSchedules()" style="width: auto; padding: 10px 20px; background: #FF725E; color: white; border-color: #FF725E;">
          <img src="/assets/img/icons/check.svg" class="svg-icon" alt="check">
          Assign Selected
        </button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
