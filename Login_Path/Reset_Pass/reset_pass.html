<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password — ClockIn</title>
  <link rel="stylesheet" href="../styles/login_ui.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../Supabase/supabase_config.js"></script>
  <script type="module" src="scripts/verify_email.js" defer></script>
  <script>
    function togglePasswordVisibility(inputId, toggleIcon) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        toggleIcon.textContent = 'visibility_off';
      } else {
        input.type = 'password';
        toggleIcon.textContent = 'visibility';
      }
    }

    // Alert Prompt Functions
    let alertTimeout;

    function showAlertPrompt(message, type = 'error') {
      const alertEl = document.getElementById('alertPrompt');
      const messageEl = alertEl.querySelector('.alert-prompt-message');
      
      messageEl.textContent = message;
      alertEl.className = 'alert-prompt ' + type;
      alertEl.classList.add('show');
      
      if (alertTimeout) {
        clearTimeout(alertTimeout);
      }
      
      alertTimeout = setTimeout(() => {
        closeAlertPrompt();
      }, 5000);
    }

    function closeAlertPrompt() {
      const alertEl = document.getElementById('alertPrompt');
      alertEl.classList.remove('show');
      
      if (alertTimeout) {
        clearTimeout(alertTimeout);
        alertTimeout = null;
      }
    }
  </script>
</head>
<body>
  <!-- Alert Prompt Container -->
  <div id="alertPrompt" class="alert-prompt">
    <span class="alert-prompt-message"></span>
    <button class="alert-prompt-close" onclick="closeAlertPrompt()">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>

  <header class="auth-header">
    <div class="logo">
      <img src="../../Images/clockin-logo.svg" alt="ClockIn Logo">
      <span>Clock In</span>
    </div>
  </header>

  <div class="login-wrapper">
    <div class="login-container">
      <div class="auth-wrapper">
        <form class="login-form" id="resetPassForm" action="#" method="get" novalidate>
          <h2 class="form-title" style="text-align: center;">Enter Details</h2>
          <p class="form-sub" style="text-align: center; color: #333;">Enter the code from your email and set a new password.</p>

          <label for="code">6-Digit Code</label>
          <input type="text" id="code" name="code" required placeholder="******" maxlength="6">

          <label for="newPassword">New Password</label>
          <div class="password-wrapper">
            <input type="password" id="newPassword" name="newPassword" required placeholder="********">
            <span class="material-symbols-outlined password-toggle" onclick="togglePasswordVisibility('newPassword', this)">visibility</span>
          </div>

          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="********">
            <span class="material-symbols-outlined password-toggle" onclick="togglePasswordVisibility('confirmPassword', this)">visibility</span>
          </div>

          <button type="submit" class="btn">Reset Password</button>

          <div class="back-link">
            <a href="/index.html">Back to Login</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <footer class="auth-footer">
    <div class="footer-links">
      <a href="Policies/terms.html">Terms of Service</a>
      <span>|</span>
      <a href="Policies/privacy_policy.html">Privacy Policy</a>
    </div>
    <div class="copyright">
      <span class="material-symbols-outlined">copyright</span> 2026 Clock In
    </div>
  </footer>
</body>
</html>
