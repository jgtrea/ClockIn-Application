<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Code — ClockIn</title>
  <link rel="stylesheet" href="../styles/login_ui.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="scripts/reset_password.js" defer></script>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-right">
      <div class="hero">
        <div class="hero-content">
          <div class="hero-title">CLOCK IN</div>
          <p class="hero-sub">See what is going on with your business</p>
        </div>
      </div>
    </div>

    <div class="auth-left">
      <div class="login-container">
        <main>
          <form class="login-form" id="resetCodeForm" action="#" method="get" novalidate>
            <h2 class="form-title">Forgot Password?</h2>
            <p class="form-sub">Enter your email to receive a login code</p>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="email@example.com">

            <div id="codeSection" style="display:none;">
              <label for="code">6-Digit Code</label>
              <input type="text" id="code" name="code" placeholder="******" maxlength="6">
              <p class="form-sub">We sent a code to <span id="userEmail"></span></p>
            </div>

            <div class="btn-wrapper">
              <button type="submit" class="btn" id="sendBtn">Send Code</button>
              <button type="button" class="btn" id="proceedBtn" style="display:none;">Proceed to Reset</button>
            </div>

            <div class="back-link">
              <a href="../login.html">Back to Login</a>
            </div>
          </form>
        </main>
      </div>
    </div>
  </div>

  <script>
    const codeSection = document.getElementById('codeSection');
    const sendBtn = document.getElementById('sendBtn');
    const proceedBtn = document.getElementById('proceedBtn');
    const userEmailSpan = document.getElementById('userEmail');
    
    proceedBtn.addEventListener('click', () => {
      window.location.href = 'reset_pass.html';
    });
  </script>
</body>
</html>
