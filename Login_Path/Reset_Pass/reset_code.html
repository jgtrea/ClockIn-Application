<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Code — ClockIn</title>
  <link rel="stylesheet" href="../styles/login_ui.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="scripts/otp_email.js" defer></script>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-right">
      <div class="hero">
        <div class="hero-content">
          <div class="hero-title">CLOCK IN</div>
          <p class="hero-sub">See what is going on with your business</p>
        </div>
      </div>
    </div>

    <div class="auth-left">
      <div class="login-container">
        <main>
          <form class="login-form" id="resetCodeForm" action="#" method="get" novalidate>
            <h2 class="form-title" style="text-align: center;">Request OTP Code</h2>
            <p class="form-sub" style="text-align: center;">Enter your email to receive a login code.</p>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="email@example.com">

            <button type="submit" class="btn" id="sendBtn">Send Code</button>

            <div class="back-link">
              <a href="/index.html">Back to Login</a>
            </div>
          </form>
        </main>
      </div>
    </div>
  </div>
</body>
</html>
